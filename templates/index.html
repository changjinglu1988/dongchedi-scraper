<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>懂车帝参数提取</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background: #fff;
            border-radius: 12px;
            padding: 40px;
            width: 680px;
            box-shadow: 0 2px 20px rgba(0,0,0,0.08);
        }
        h1 { font-size: 22px; margin-bottom: 8px; color: #111; }
        p.desc { font-size: 14px; color: #888; margin-bottom: 24px; }
        label { display: block; font-size: 14px; color: #333; margin-bottom: 8px; font-weight: 500; }
        textarea {
            width: 100%;
            height: 150px;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            resize: vertical;
            transition: border-color .2s;
            line-height: 1.6;
        }
        textarea:focus { border-color: #4a90d9; }
        .hint { font-size: 12px; color: #aaa; margin-top: 6px; }
        button {
            margin-top: 16px;
            width: 100%;
            padding: 12px;
            background: #4a90d9;
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            cursor: pointer;
            transition: background .2s;
        }
        button:hover { background: #357abd; }
        button:disabled { background: #aaa; cursor: not-allowed; }
        .msg { margin-top: 14px; font-size: 13px; white-space: pre-line; }
        .msg.error { color: #e74c3c; }
        .msg.success { color: #27ae60; }
    </style>
</head>
<body>
    <div class="container">
        <h1>懂车帝参数提取</h1>
        <p class="desc">粘贴懂车帝车型参数页链接（每行一个），自动提取参数并下载 Excel 文件</p>
        <form id="form">
            <label for="urls">车型参数页链接</label>
            <textarea id="urls" name="urls" placeholder="https://www.dongchedi.com/auto/params-carIds-254067&#10;https://www.dongchedi.com/auto/params-carIds-254068" required></textarea>
            <p class="hint">每行粘贴一个链接，多个车型参数将保存在同一个 Excel 的不同工作表中</p>
            <button type="submit" id="btn">提取参数</button>
        </form>
        <div class="msg" id="msg"></div>
    </div>
    <script>
        document.getElementById("form").addEventListener("submit", async (e) => {
            e.preventDefault();
            const btn = document.getElementById("btn");
            const msg = document.getElementById("msg");
            btn.disabled = true;
            btn.textContent = "正在提取...";
            msg.textContent = "";
            msg.className = "msg";
            try {
                const formData = new FormData();
                formData.append("urls", document.getElementById("urls").value);
                const resp = await fetch("/api/scrape", {
                    method: "POST",
                    body: formData
                });
                if (!resp.ok) {
                    const text = await resp.text();
                    msg.textContent = text;
                    msg.className = "msg error";
                    return;
                }
                const blob = await resp.blob();
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                const disp = resp.headers.get("Content-Disposition") || "";
                a.download = (disp.match(/filename=(.+)/) || [null, "params.xlsx"])[1].replace(/"/g, "");
                a.click();
                URL.revokeObjectURL(a.href);
                msg.textContent = "下载完成";
                msg.className = "msg success";
            } catch (err) {
                msg.textContent = "网络错误：" + err.message;
                msg.className = "msg error";
            } finally {
                btn.disabled = false;
                btn.textContent = "提取参数";
            }
        });
    </script>
</body>
</html>
